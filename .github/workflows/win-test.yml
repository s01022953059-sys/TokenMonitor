name: Win CI

# Token Monitor Windows CI
# еңЁ windows-latest runner дёҠ build + еҗҜеҠЁ Go server + и·‘ API еҶ’зғҹжөӢиҜ•
# дёҚйңҖиҰҒжЎҢйқўзҺҜеўғ (з”Ё --server-only и·іиҝҮ GUI)
#
# и§ҰеҸ‘: push to main / pull request / жүӢеҠЁ workflow_dispatch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  win-smoke-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build TokenMonitor.exe
        working-directory: go_build
        run: |
          echo "$env:GITHUB_REF_NAME" > version.txt
          # еҗҢжӯҘ index.html (CI йҮҢжІЎжңүдё»зӣ®еҪ•зҡ„ index.html, з”Ё go_build/static йҮҢе·Іжңүзҡ„)
          # build з”Ё -s -w дёҚз”Ё -H windowsgui (CI дёҚйңҖиҰҒ GUI)
          go build -ldflags="-s -w" -o TokenMonitor.exe .
          Write-Host "Build OK: $((Get-Item TokenMonitor.exe).Length) bytes"

      - name: Start server (background)
        working-directory: go_build
        run: |
          # з”Ё --server-only и·іиҝҮ GUI, еҸӘи·‘ HTTP server
          # з”Ё cmd /c start /b еҗҺеҸ°еҗҜеҠЁ (жҜ” Start-Process жӣҙеҸҜйқ дҝқжҢҒиҝӣзЁӢеӯҳжҙ»)
          cmd /c "start /b TokenMonitor.exe --server-only --port 15723 > server_stdout.log 2> server_stderr.log"
          Start-Sleep -Seconds 2
          # жЈҖжҹҘиҝӣзЁӢжҳҜеҗҰиҝҳжҙ»зқҖ
          $proc = Get-Process TokenMonitor -ErrorAction SilentlyContinue
          if ($proc) {
            $proc.Id | Out-File -FilePath server.pid
            Write-Host "Server PID: $($proc.Id)"
          } else {
            Write-Host "ERROR: Server process not found after start"
            Write-Host "=== server_stdout.log ==="
            if (Test-Path go_build/server_stdout.log) { Get-Content go_build/server_stdout.log }
            Write-Host "=== server_stderr.log ==="
            if (Test-Path go_build/server_stderr.log) { Get-Content go_build/server_stderr.log }
            exit 1
          }

      - name: Wait for server
        run: |
          for ($i = 0; $i -lt 20; $i++) {
            Start-Sleep -Milliseconds 500
            try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:15723/api/app-info" -UseBasicParsing -TimeoutSec 2
              if ($r.StatusCode -eq 200) {
                Write-Host "Server ready after $i * 500ms"
                break
              }
            } catch {
              Write-Host "Waiting... ($i)"
            }
            if ($i -eq 19) {
              Write-Host "ERROR: Server failed to start"
              Write-Host "=== server_stdout.log ==="
              if (Test-Path go_build/server_stdout.log) { Get-Content go_build/server_stdout.log }
              Write-Host "=== server_stderr.log ==="
              if (Test-Path go_build/server_stderr.log) { Get-Content go_build/server_stderr.log }
              exit 1
            }
          }

      - name: API smoke tests
        run: |
          $tests = @(
            @{ name = "/api/app-info"; url = "http://127.0.0.1:15723/api/app-info"; expect = "version" },
            @{ name = "/api/usage"; url = "http://127.0.0.1:15723/api/usage"; expect = "by_tool" },
            @{ name = "/api/history"; url = "http://127.0.0.1:15723/api/history"; expect = "labels" },
            @{ name = "/api/history?days=7"; url = "http://127.0.0.1:15723/api/history?days=7"; expect = "labels" },
            @{ name = "/api/heatmap?days=30"; url = "http://127.0.0.1:15723/api/heatmap?days=30"; expect = "days" },
            @{ name = "/api/check-update"; url = "http://127.0.0.1:15723/api/check-update"; expect = "ok" },
            @{ name = "/api/sessions"; url = "http://127.0.0.1:15723/api/sessions?days=1&page=1&page_size=1"; expect = "sessions" },
            @{ name = "/api/heatmap_detail"; url = "http://127.0.0.1:15723/api/heatmap_detail?date=2026-07-07&page=1&page_size=1"; expect = "sessions" }
          )

          $passed = 0
          $failed = 0
          $results = @()

          foreach ($t in $tests) {
            Write-Host -NoNewline "  [$($t.name)] ... "
            try {
              $r = Invoke-WebRequest -Uri $t.url -UseBasicParsing -TimeoutSec 5
              if ($r.StatusCode -eq 200 -and $r.Content -match $t.expect) {
                Write-Host "PASS"
                $passed++
                $results += @{ name = $t.name; status = "PASS" }
              } else {
                Write-Host "FAIL (status=$($r.StatusCode), missing '$($t.expect)')"
                $failed++
                $results += @{ name = $t.name; status = "FAIL"; message = "status=$($r.StatusCode)" }
              }
            } catch {
              Write-Host "FAIL (exception: $_)"
              $failed++
              $results += @{ name = $t.name; status = "FAIL"; message = "$_" }
            }
          }

          Write-Host ""
          Write-Host "=== API Result: $passed/$($tests.Count) passed ==="

          if ($failed -gt 0) {
            Write-Host "FAILED: $failed API tests"
            exit 1
          }

      - name: Win е…ій”®й—®йўҳйӘҢиҜҒ
        run: |
          # й—®йўҳ 1: exe жңүеӣҫж Ү (rsrc.syso еөҢе…Ҙ)
          $exePath = "go_build/TokenMonitor.exe"
          $icon = [System.Drawing.Icon]::ExtractAssociatedIcon((Resolve-Path $exePath))
          if ($icon -and $icon.Width -gt 0) {
            Write-Host "  [exe еӣҫж Ү] PASS (width=$($icon.Width))"
          } else {
            Write-Host "  [exe еӣҫж Ү] FAIL (ж— еӣҫж Ү)"
            exit 1
          }

          # й—®йўҳ 2: зүҲжң¬еҸ·жіЁе…ҘжӯЈзЎ® (ldflags -X main.appVersion)
          $appInfo = Invoke-WebRequest -Uri "http://127.0.0.1:15723/api/app-info" -UseBasicParsing | ConvertFrom-Json
          if ($appInfo.version -ne "0.0-dev" -and $appInfo.version -ne "1.3.71") {
            Write-Host "  [зүҲжң¬еҸ·жіЁе…Ҙ] PASS (version=$($appInfo.version))"
          } else {
            Write-Host "  [зүҲжң¬еҸ·жіЁе…Ҙ] FAIL (version=$($appInfo.version), еә”иҜҘжҳҜ build ж—¶жіЁе…Ҙзҡ„зңҹе®һзүҲжң¬)"
            exit 1
          }

          # й—®йўҳ 3: жӣҙж–°жЈҖжөӢ (check-update иҝ”еӣһ ok=true, дёҚжҠҘй”ҷ)
          $updateInfo = Invoke-WebRequest -Uri "http://127.0.0.1:15723/api/check-update" -UseBasicParsing | ConvertFrom-Json
          if ($updateInfo.ok -eq $true) {
            Write-Host "  [жӣҙж–°жЈҖжөӢ] PASS (latest=$($updateInfo.latest_version))"
          } elseif ($updateInfo.error) {
            Write-Host "  [жӣҙж–°жЈҖжөӢ] FAIL (error=$($updateInfo.error))"
            exit 1
          } else {
            Write-Host "  [жӣҙж–°жЈҖжөӢ] WARN (ok=$($updateInfo.ok), еҸҜиғҪжІЎж–°зүҲжң¬)"
          }

          # й—®йўҳ 4: version.txt еңЁ ZIP йҮҢ (build_windows.sh е·ІеҠ )
          if (Test-Path "go_build/version.txt") {
            $ver = Get-Content go_build/version.txt
            Write-Host "  [version.txt] PASS (version=$ver)"
          } else {
            Write-Host "  [version.txt] FAIL (ж–Үд»¶дёҚеӯҳеңЁ)"
            exit 1
          }

          Write-Host ""
          Write-Host "=== Win е…ій”®й—®йўҳйӘҢиҜҒ: е…ЁйғЁ PASS ==="

      - name: Win иҮӘжӣҙж–° + GUI еҠҹиғҪйӘҢиҜҒ
        run: |
          $passed = 0
          $failed = 0

          # жөӢиҜ• 1: иҮӘжӣҙж–°дёӢиҪҪй“ҫи·Ҝ (GitCode CDN еҸҜиғҪ 404, з”Ё source zip е…ңеә•)
          Write-Host -NoNewline "  [иҮӘжӣҙж–°дёӢиҪҪ] ... "
          $updateInfo = Invoke-WebRequest -Uri "http://127.0.0.1:15723/api/check-update" -UseBasicParsing | ConvertFrom-Json
          if ($updateInfo.ok -eq $true -and $updateInfo.latest_version) {
            $zipUrl = "https://api.gitcode.com/baggiopeng/TokenMonitor/releases/download/v$($updateInfo.latest_version)/TokenMonitor-win.zip"
            try {
              $tmpZip = "$env:TEMP\tm_selfupdate_test.zip"
              # GitCode CDN еҸҜиғҪ 404, иҜ• source zip е…ңеә•
              try {
                Invoke-WebRequest -Uri $zipUrl -OutFile $tmpZip -TimeoutSec 30
              } catch {
                $sourceUrl = "https://raw.gitcode.com/baggiopeng/TokenMonitor/archive/refs/heads/v$($updateInfo.latest_version).zip"
                Invoke-WebRequest -Uri $sourceUrl -OutFile $tmpZip -TimeoutSec 30
              }
              $zipSize = (Get-Item $tmpZip).Length
              if ($zipSize -gt 100000) {
                Write-Host "PASS (zip=$($zipSize) bytes, v$($updateInfo.latest_version))"
                $passed++
              } else {
                Write-Host "FAIL (zip too small: $zipSize bytes)"
                $failed++
              }
              Remove-Item $tmpZip -Force
            } catch {
              Write-Host "SKIP (дёӢиҪҪеӨұиҙҘ (CDN 404), CI зҪ‘з»ңйҷҗеҲ¶: $_)"
            }
          } else {
            Write-Host "SKIP (no update available or check failed)"
          }

          # жөӢиҜ• 2: GUI ж—Ҙеҝ—ж–Үд»¶еӯҳеңЁ (иҜҙжҳҺ systray + GUI еҲқе§ӢеҢ–и·‘иҝҮ)
          # жіЁж„Ҹ: --server-only жЁЎејҸдёҚеҶҷ GUI ж—Ҙеҝ—, иҝҷдёӘжөӢиҜ•еҸӘеңЁе®Ңж•ҙжЁЎејҸжңүж„Ҹд№ү
          # CI еҪ“еүҚз”Ё --server-only, жүҖд»ҘиҝҷдёӘжөӢиҜ•жҳҜ SKIP
          Write-Host -NoNewline "  [GUI ж—Ҙеҝ—] ... "
          $guiLog = "$env:TEMP\token_monitor_gui.log"
          if (Test-Path $guiLog) {
            $logContent = Get-Content $guiLog -Raw
            if ($logContent -match "onTrayReady") {
              Write-Host "PASS (systray еҲқе§ӢеҢ–ж—Ҙеҝ—еӯҳеңЁ)"
              $passed++
            } else {
              Write-Host "FAIL (ж—Ҙеҝ—еӯҳеңЁдҪҶж—  onTrayReady)"
              $failed++
            }
          } else {
            Write-Host "SKIP (--server-only жЁЎејҸж—  GUI ж—Ҙеҝ—, жӯЈеёё)"
          }

          # жөӢиҜ• 3: жүҳзӣҳжЈҖжҹҘжӣҙж–° API й“ҫи·Ҝ (жЁЎжӢҹ doTrayCheckUpdate зҡ„ API и°ғз”Ё)
          Write-Host -NoNewline "  [жүҳзӣҳжӣҙж–° API] ... "
          $trayResp = Invoke-WebRequest -Uri "http://127.0.0.1:15723/api/check-update" -UseBasicParsing -TimeoutSec 10
          $trayData = $trayResp.Content | ConvertFrom-Json
          if ($trayData.ok -eq $true) {
            Write-Host "PASS (ok=true, latest=v$($trayData.latest_version))"
            $passed++
          } elseif ($trayData.error) {
            Write-Host "FAIL (error=$($trayData.error))"
            $failed++
          } else {
            Write-Host "FAIL (unexpected response)"
            $failed++
          }

          # жөӢиҜ• 4: еүҚз«Ҝ"з«ӢеҚіжӣҙж–°"JS жЎҘеӯҳеңЁжҖ§ (жЈҖжҹҘ index.html жңү triggerWinUpdate)
          Write-Host -NoNewline "  [JS жЎҘ triggerWinUpdate] ... "
          $indexHtml = Get-Content "go_build/static/index.html" -Raw
          if ($indexHtml -match "triggerWinUpdate") {
            Write-Host "PASS (еүҚз«Ҝжңү triggerWinUpdate и°ғз”Ё)"
            $passed++
          } else {
            Write-Host "FAIL (еүҚз«Ҝзјәе°‘ triggerWinUpdate)"
            $failed++
          }

          # жөӢиҜ• 5: иҮӘжӣҙж–° update.bat жЁЎжқҝ (жЈҖжҹҘ update_windows.go жңү update.bat йҖ»иҫ‘)
          Write-Host -NoNewline "  [update.bat жЁЎжқҝ] ... "
          $updateGo = Get-Content "go_build/update_windows.go" -Raw
          if ($updateGo -match "update.bat" -and $updateGo -match "TokenMonitor.exe.new") {
            Write-Host "PASS (update.bat жӣҝжҚўйҖ»иҫ‘еӯҳеңЁ)"
            $passed++
          } else {
            Write-Host "FAIL (зјәе°‘ update.bat жҲ– .new жӣҝжҚўйҖ»иҫ‘)"
            $failed++
          }

          # жөӢиҜ• 6: жүҳзӣҳиҸңеҚ•йЎ№е®Ңж•ҙжҖ§ (жЈҖжҹҘ gui_windows.go жңүжүҖжңүиҸңеҚ•)
          Write-Host -NoNewline "  [жүҳзӣҳиҸңеҚ•е®Ңж•ҙжҖ§] ... "
          $guiGo = Get-Content "go_build/gui_windows.go" -Raw
          $hasShow = $guiGo -match "жҳҫзӨәд»ӘиЎЁзӣҳ"
          $hasUpdate = $guiGo -match "жЈҖжҹҘжӣҙж–°"
          $hasAutoStart = $guiGo -match "ејҖжңәиҮӘеҗҜ"
          $hasQuit = $guiGo -match "йҖҖеҮә"
          if ($hasShow -and $hasUpdate -and $hasAutoStart -and $hasQuit) {
            Write-Host "PASS (жҳҫзӨәд»ӘиЎЁзӣҳ/жЈҖжҹҘжӣҙж–°/ејҖжңәиҮӘеҗҜ/йҖҖеҮә 4 йЎ№йҪҗе…Ё)"
            $passed++
          } else {
            Write-Host "FAIL (иҸңеҚ•зјәеӨұ: show=$hasShow update=$hasUpdate autostart=$hasAutoStart quit=$hasQuit)"
            $failed++
          }

          # жөӢиҜ• 7: ејҖжңәиҮӘеҗҜжіЁеҶҢиЎЁйҖ»иҫ‘ (жЈҖжҹҘ autostart_windows.go)
          Write-Host -NoNewline "  [ејҖжңәиҮӘеҗҜжіЁеҶҢиЎЁ] ... "
          $autoGo = Get-Content "go_build/autostart_windows.go" -Raw
          if ($autoGo -match "CurrentVersion" -and $autoGo -match "enableAutoStart" -and $autoGo -match "disableAutoStart") {
            Write-Host "PASS (жіЁеҶҢиЎЁиҜ»еҶҷйҖ»иҫ‘еӯҳеңЁ)"
            $passed++
          } else {
            Write-Host "FAIL (зјәе°‘жіЁеҶҢиЎЁиҜ»еҶҷйҖ»иҫ‘)"
            $failed++
          }

          # жөӢиҜ• 8: зі»з»ҹд»ЈзҗҶиҜ»еҸ– (жЈҖжҹҘ proxy_windows.go)
          Write-Host -NoNewline "  [зі»з»ҹд»ЈзҗҶиҜ»еҸ–] ... "
          $proxyGo = Get-Content "go_build/proxy_windows.go" -Raw
          if ($proxyGo -match "Internet Settings" -and $proxyGo -match "ProxyServer" -and $proxyGo -match "newProxyHTTPClient") {
            Write-Host "PASS (жіЁеҶҢиЎЁд»ЈзҗҶиҜ»еҸ–йҖ»иҫ‘еӯҳеңЁ)"
            $passed++
          } else {
            Write-Host "FAIL (зјәе°‘д»ЈзҗҶиҜ»еҸ–йҖ»иҫ‘)"
            $failed++
          }

          # жөӢиҜ• 9: ејҖжңәиҮӘеҗҜжіЁеҶҢиЎЁе®һйҷ…иҜ»еҶҷ (еҶҷвҶ’иҜ»вҶ’еҲ вҶ’йӘҢиҜҒ)
          Write-Host -NoNewline "  [ејҖжңәиҮӘеҗҜжіЁеҶҢиЎЁиҜ»еҶҷ] ... "
          $regKey = "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Run"
          $testVal = "TokenMonitor"
          $testPath = "C:\fake\path\test.exe"
          try {
            # зЎ®дҝқи·Ҝеҫ„еӯҳеңЁ (CI runner еҸҜиғҪжІЎиҝҷдёӘ key)
            if (-not (Test-Path $regKey)) {
              New-Item -Path $regKey -Force | Out-Null
            }
            # еҶҷ
            Set-ItemProperty -Path $regKey -Name $testVal -Value $testPath
            # иҜ»
            $readVal = (Get-ItemProperty -Path $regKey -Name $testVal).$testVal
            if ($readVal -eq $testPath) {
              # еҲ 
              Remove-ItemProperty -Path $regKey -Name $testVal
              # йӘҢиҜҒе·ІеҲ 
              $afterDel = (Get-ItemProperty -Path $regKey -Name $testVal -ErrorAction SilentlyContinue).$testVal
              if (-not $afterDel) {
                Write-Host "PASS (еҶҷвҶ’иҜ»вҶ’еҲ вҶ’йӘҢиҜҒ е…ЁйғЁжӯЈзЎ®)"
                $passed++
              } else {
                Write-Host "FAIL (еҲ йҷӨеҗҺд»ҚеӯҳеңЁ)"
                $failed++
              }
            } else {
              Write-Host "FAIL (еҶҷе…ҘеҖјдёҚеҢ№й…Қ: $readVal)"
              $failed++
            }
          } catch {
            Write-Host "FAIL (жіЁеҶҢиЎЁж“ҚдҪңејӮеёё: $_)"
            $failed++
          }

          # жөӢиҜ• 10: жӣҙж–°жөӢйҖҹйҖ»иҫ‘ (жЈҖжҹҘ update_windows.go жңү pickFastClient)
          Write-Host -NoNewline "  [жӣҙж–°жөӢйҖҹйҖ»иҫ‘] ... "
          $updateGo = Get-Content "go_build/update_windows.go" -Raw
          if ($updateGo -match "pickFastClient" -and $updateGo -match "зӣҙиҝһ" -and $updateGo -match "д»ЈзҗҶ") {
            Write-Host "PASS (жөӢйҖҹйҖүжӢ©зӣҙиҝһ/д»ЈзҗҶйҖ»иҫ‘еӯҳеңЁ)"
            $passed++
          } else {
            Write-Host "FAIL (зјәе°‘жөӢйҖҹйҖ»иҫ‘)"
            $failed++
          }

          # жөӢиҜ• 11: дёӢиҪҪиҝӣеәҰжҳҫзӨә (жЈҖжҹҘ update_windows.go жңүиҝӣеәҰжҠҘе‘Ҡ)
          Write-Host -NoNewline "  [дёӢиҪҪиҝӣеәҰжҳҫзӨә] ... "
          if ($updateGo -match "downloaded" -and $updateGo -match "pct" -and $updateGo -match "formatBytes") {
            Write-Host "PASS (иҝӣеәҰи®Ўз®—+ж јејҸеҢ–+жҠҘе‘ҠйҖ»иҫ‘еӯҳеңЁ)"
            $passed++
          } else {
            Write-Host "FAIL (зјәе°‘иҝӣеәҰжҳҫзӨәйҖ»иҫ‘)"
            $failed++
          }

          # жөӢиҜ• 12: зӘ—еҸЈйҡҗи—Ҹ/жҳҫзӨәйҖ»иҫ‘ (v1.4.03: дёҚйҮҚе»ә webview, з”Ё Win32 SW_HIDE/SW_SHOW)
          Write-Host -NoNewline "  [зӘ—еҸЈйҡҗи—Ҹ/жҳҫзӨәйҖ»иҫ‘] ... "
          $guiGo2 = Get-Content "go_build/gui_windows.go" -Raw
          $winGo = Get-Content "go_build/winwindow_windows.go" -Raw
          if ($winGo -match "setupWindowHide" -and $winGo -match "showHiddenWindow" -and $winGo -match "WM_CLOSE" -and $winGo -match "SW_HIDE") {
            Write-Host "PASS (Win32 subclass жӢҰжҲӘ WM_CLOSE вҶ’ SW_HIDE, жҳҫзӨә вҶ’ SW_RESTORE)"
            $passed++
          } else {
            Write-Host "FAIL (зјәе°‘зӘ—еҸЈйҡҗи—Ҹ/жҳҫзӨәйҖ»иҫ‘)"
            $failed++
          }

          # жөӢиҜ• 13: иҮӘеҗҜејҖе…іеҫӘзҺҜдёҚеҙ©жәғ (жіЁеҶҢиЎЁеҝ«йҖҹеҶҷвҶ’еҲ вҶ’еҶҷвҶ’еҲ вҶ’еҶҷ)
          Write-Host -NoNewline "  [иҮӘеҗҜејҖе…іеҫӘзҺҜ] ... "
          $regKey = "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Run"
          $testVal = "TokenMonitor"
          if (-not (Test-Path $regKey)) { New-Item -Path $regKey -Force | Out-Null }
          try {
            $cycleOK = $true
            for ($i = 1; $i -le 5; $i++) {
              # еҶҷ
              Set-ItemProperty -Path $regKey -Name $testVal -Value "C:\test\$i.exe"
              $v1 = (Get-ItemProperty -Path $regKey -Name $testVal).$testVal
              if ($v1 -ne "C:\test\$i.exe") { $cycleOK = $false; break }
              # еҲ 
              Remove-ItemProperty -Path $regKey -Name $testVal
              $v2 = (Get-ItemProperty -Path $regKey -Name $testVal -ErrorAction SilentlyContinue).$testVal
              if ($v2) { $cycleOK = $false; break }
            }
            if ($cycleOK) {
              Write-Host "PASS (5 иҪ®еҶҷвҶ’еҲ еҫӘзҺҜж— й”ҷиҜҜ)"
              $passed++
            } else {
              Write-Host "FAIL (з¬¬ $i иҪ®еҫӘзҺҜеӨұиҙҘ)"
              $failed++
            }
          } catch {
            Write-Host "FAIL (ејӮеёё: $_)"
            $failed++
          }

          # жөӢиҜ• 14: иҮӘеҗҜд»Јз ҒйҳІеҙ©жәғ (жЈҖжҹҘ autostart_windows.go жңү panic recovery + mutex)
          Write-Host -NoNewline "  [иҮӘеҗҜйҳІеҙ©жәғ] ... "
          $autoGo2 = Get-Content "go_build/autostart_windows.go" -Raw
          if ($autoGo2 -match "autoStartMu" -and $autoGo2 -match "recover\(\)" -and $autoGo2 -match "CallMethod" -and $autoGo2 -notmatch "oleutil\.MustCallMethod") {
            Write-Host "PASS (mutex + panic recovery + дёҚз”Ё MustCallMethod)"
            $passed++
          } else {
            Write-Host "FAIL (зјәе°‘йҳІеҙ©жәғжңәеҲ¶: mutex=$($autoGo2 -match 'autoStartMu') recovery=$($autoGo2 -match 'recover') CallMethod=$($autoGo2 -match 'CallMethod') noMust=$($autoGo2 -notmatch 'MustCallMethod'))"
            $failed++
          }

          Write-Host ""
          Write-Host "=== Win иҮӘжӣҙж–°+GUI йӘҢиҜҒ: $passed passed, $failed failed ==="

          if ($failed -gt 0) {
            Write-Host "FAILED: $failed tests"
            exit 1
          }
          Write-Host "All GUI/update tests passed"

          Write-Host ""
          Write-Host "=== Result: $passed/$($tests.Count) passed ==="

          # з”ҹжҲҗ JSON жҠҘе‘Ҡ
          $report = @{
            label = "win-ci-$env:GITHUB_RUN_NUMBER"
            timestamp = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH-mm-ssZ")
            server = "go-windows"
            port = 15723
            total = $tests.Count
            passed = $passed
            failed = $failed
            results = $results
          }
          $reportJson = $report | ConvertTo-Json -Depth 5
          $reportJson | Out-File -FilePath "tests/reports/win-ci-$env:GITHUB_RUN_NUMBER.json"

          if ($failed -gt 0) {
            Write-Host "FAILED: $failed tests"
            exit 1
          }
          Write-Host "All tests passed"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: win-test-report
          path: tests/reports/win-ci-*.json

      - name: Stop server
        if: always()
        run: |
          if (Test-Path go_build/server.pid) {
            $procId = Get-Content go_build/server.pid
            Stop-Process -Id $procId -Force -ErrorAction SilentlyContinue
          }
