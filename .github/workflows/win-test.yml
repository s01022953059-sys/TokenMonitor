name: Win CI

# Token Monitor Windows CI
# 在 windows-latest runner 上 build + 启动 Go server + 跑 API 冒烟测试
# 不需要桌面环境 (用 --server-only 跳过 GUI)
#
# 触发: push to main / pull request / 手动 workflow_dispatch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  win-smoke-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build TokenMonitor.exe
        working-directory: go_build
        run: |
          echo "$env:GITHUB_REF_NAME" > version.txt
          # 同步 index.html (CI 里没有主目录的 index.html, 用 go_build/static 里已有的)
          # build 用 -s -w 不用 -H windowsgui (CI 不需要 GUI)
          go build -ldflags="-s -w" -o TokenMonitor.exe .
          Write-Host "Build OK: $((Get-Item TokenMonitor.exe).Length) bytes"

      - name: Start server (background)
        working-directory: go_build
        run: |
          # 用 --server-only 跳过 GUI, 只跑 HTTP server
          # 用 cmd /c start /b 后台启动 (比 Start-Process 更可靠保持进程存活)
          cmd /c "start /b TokenMonitor.exe --server-only --port 15723 > server_stdout.log 2> server_stderr.log"
          Start-Sleep -Seconds 2
          # 检查进程是否还活着
          $proc = Get-Process TokenMonitor -ErrorAction SilentlyContinue
          if ($proc) {
            $proc.Id | Out-File -FilePath server.pid
            Write-Host "Server PID: $($proc.Id)"
          } else {
            Write-Host "ERROR: Server process not found after start"
            Write-Host "=== server_stdout.log ==="
            if (Test-Path go_build/server_stdout.log) { Get-Content go_build/server_stdout.log }
            Write-Host "=== server_stderr.log ==="
            if (Test-Path go_build/server_stderr.log) { Get-Content go_build/server_stderr.log }
            exit 1
          }

      - name: Wait for server
        run: |
          for ($i = 0; $i -lt 20; $i++) {
            Start-Sleep -Milliseconds 500
            try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:15723/api/app-info" -UseBasicParsing -TimeoutSec 2
              if ($r.StatusCode -eq 200) {
                Write-Host "Server ready after $i * 500ms"
                break
              }
            } catch {
              Write-Host "Waiting... ($i)"
            }
            if ($i -eq 19) {
              Write-Host "ERROR: Server failed to start"
              Write-Host "=== server_stdout.log ==="
              if (Test-Path go_build/server_stdout.log) { Get-Content go_build/server_stdout.log }
              Write-Host "=== server_stderr.log ==="
              if (Test-Path go_build/server_stderr.log) { Get-Content go_build/server_stderr.log }
              exit 1
            }
          }

      - name: API smoke tests
        run: |
          $tests = @(
            @{ name = "/api/app-info"; url = "http://127.0.0.1:15723/api/app-info"; expect = "version" },
            @{ name = "/api/usage"; url = "http://127.0.0.1:15723/api/usage"; expect = "by_tool" },
            @{ name = "/api/history"; url = "http://127.0.0.1:15723/api/history"; expect = "labels" },
            @{ name = "/api/history?days=7"; url = "http://127.0.0.1:15723/api/history?days=7"; expect = "labels" },
            @{ name = "/api/heatmap?days=30"; url = "http://127.0.0.1:15723/api/heatmap?days=30"; expect = "days" },
            @{ name = "/api/check-update"; url = "http://127.0.0.1:15723/api/check-update"; expect = "ok" },
            @{ name = "/api/sessions"; url = "http://127.0.0.1:15723/api/sessions?days=1&page=1&page_size=1"; expect = "sessions" },
            @{ name = "/api/heatmap_detail"; url = "http://127.0.0.1:15723/api/heatmap_detail?date=2026-07-07&page=1&page_size=1"; expect = "sessions" }
          )

          $passed = 0
          $failed = 0
          $results = @()

          foreach ($t in $tests) {
            Write-Host -NoNewline "  [$($t.name)] ... "
            try {
              $r = Invoke-WebRequest -Uri $t.url -UseBasicParsing -TimeoutSec 5
              if ($r.StatusCode -eq 200 -and $r.Content -match $t.expect) {
                Write-Host "PASS"
                $passed++
                $results += @{ name = $t.name; status = "PASS" }
              } else {
                Write-Host "FAIL (status=$($r.StatusCode), missing '$($t.expect)')"
                $failed++
                $results += @{ name = $t.name; status = "FAIL"; message = "status=$($r.StatusCode)" }
              }
            } catch {
              Write-Host "FAIL (exception: $_)"
              $failed++
              $results += @{ name = $t.name; status = "FAIL"; message = "$_" }
            }
          }

          Write-Host ""
          Write-Host "=== API Result: $passed/$($tests.Count) passed ==="

          if ($failed -gt 0) {
            Write-Host "FAILED: $failed API tests"
            exit 1
          }

      - name: Win 关键问题验证
        run: |
          # 问题 1: exe 有图标 (rsrc.syso 嵌入)
          $exePath = "go_build/TokenMonitor.exe"
          $icon = [System.Drawing.Icon]::ExtractAssociatedIcon((Resolve-Path $exePath))
          if ($icon -and $icon.Width -gt 0) {
            Write-Host "  [exe 图标] PASS (width=$($icon.Width))"
          } else {
            Write-Host "  [exe 图标] FAIL (无图标)"
            exit 1
          }

          # 问题 2: 版本号注入正确 (ldflags -X main.appVersion)
          $appInfo = Invoke-WebRequest -Uri "http://127.0.0.1:15723/api/app-info" -UseBasicParsing | ConvertFrom-Json
          if ($appInfo.version -ne "0.0-dev" -and $appInfo.version -ne "1.3.71") {
            Write-Host "  [版本号注入] PASS (version=$($appInfo.version))"
          } else {
            Write-Host "  [版本号注入] FAIL (version=$($appInfo.version), 应该是 build 时注入的真实版本)"
            exit 1
          }

          # 问题 3: 更新检测 (check-update 返回 ok=true, 不报错)
          $updateInfo = Invoke-WebRequest -Uri "http://127.0.0.1:15723/api/check-update" -UseBasicParsing | ConvertFrom-Json
          if ($updateInfo.ok -eq $true) {
            Write-Host "  [更新检测] PASS (latest=$($updateInfo.latest_version))"
          } elseif ($updateInfo.error) {
            Write-Host "  [更新检测] FAIL (error=$($updateInfo.error))"
            exit 1
          } else {
            Write-Host "  [更新检测] WARN (ok=$($updateInfo.ok), 可能没新版本)"
          }

          # 问题 4: version.txt 在 ZIP 里 (build_windows.sh 已加)
          if (Test-Path "go_build/version.txt") {
            $ver = Get-Content go_build/version.txt
            Write-Host "  [version.txt] PASS (version=$ver)"
          } else {
            Write-Host "  [version.txt] FAIL (文件不存在)"
            exit 1
          }

          Write-Host ""
          Write-Host "=== Win 关键问题验证: 全部 PASS ==="

      - name: Win 自更新 + GUI 功能验证
        run: |
          $passed = 0
          $failed = 0

          # 测试 1: 自更新下载链路 (GitCode CDN 可能 404, 用 source zip 兜底)
          Write-Host -NoNewline "  [自更新下载] ... "
          $updateInfo = Invoke-WebRequest -Uri "http://127.0.0.1:15723/api/check-update" -UseBasicParsing | ConvertFrom-Json
          if ($updateInfo.ok -eq $true -and $updateInfo.latest_version) {
            $zipUrl = "https://api.gitcode.com/baggiopeng/TokenMonitor/releases/download/v$($updateInfo.latest_version)/TokenMonitor-win.zip"
            try {
              $tmpZip = "$env:TEMP\tm_selfupdate_test.zip"
              # GitCode CDN 可能 404, 试 source zip 兜底
              try {
                Invoke-WebRequest -Uri $zipUrl -OutFile $tmpZip -TimeoutSec 30
              } catch {
                $sourceUrl = "https://raw.gitcode.com/baggiopeng/TokenMonitor/archive/refs/heads/v$($updateInfo.latest_version).zip"
                Invoke-WebRequest -Uri $sourceUrl -OutFile $tmpZip -TimeoutSec 30
              }
              $zipSize = (Get-Item $tmpZip).Length
              if ($zipSize -gt 100000) {
                Write-Host "PASS (zip=$($zipSize) bytes, v$($updateInfo.latest_version))"
                $passed++
              } else {
                Write-Host "FAIL (zip too small: $zipSize bytes)"
                $failed++
              }
              Remove-Item $tmpZip -Force
            } catch {
              Write-Host "SKIP (下载失败 (CDN 404), CI 网络限制: $_)"
            }
          } else {
            Write-Host "SKIP (no update available or check failed)"
          }

          # 测试 2: GUI 日志文件存在 (说明 systray + GUI 初始化跑过)
          # 注意: --server-only 模式不写 GUI 日志, 这个测试只在完整模式有意义
          # CI 当前用 --server-only, 所以这个测试是 SKIP
          Write-Host -NoNewline "  [GUI 日志] ... "
          $guiLog = "$env:TEMP\token_monitor_gui.log"
          if (Test-Path $guiLog) {
            $logContent = Get-Content $guiLog -Raw
            if ($logContent -match "onTrayReady") {
              Write-Host "PASS (systray 初始化日志存在)"
              $passed++
            } else {
              Write-Host "FAIL (日志存在但无 onTrayReady)"
              $failed++
            }
          } else {
            Write-Host "SKIP (--server-only 模式无 GUI 日志, 正常)"
          }

          # 测试 3: 托盘检查更新 API 链路 (模拟 doTrayCheckUpdate 的 API 调用)
          Write-Host -NoNewline "  [托盘更新 API] ... "
          $trayResp = Invoke-WebRequest -Uri "http://127.0.0.1:15723/api/check-update" -UseBasicParsing -TimeoutSec 10
          $trayData = $trayResp.Content | ConvertFrom-Json
          if ($trayData.ok -eq $true) {
            Write-Host "PASS (ok=true, latest=v$($trayData.latest_version))"
            $passed++
          } elseif ($trayData.error) {
            Write-Host "FAIL (error=$($trayData.error))"
            $failed++
          } else {
            Write-Host "FAIL (unexpected response)"
            $failed++
          }

          # 测试 4: 前端"立即更新"JS 桥存在性 (检查 index.html 有 triggerWinUpdate)
          Write-Host -NoNewline "  [JS 桥 triggerWinUpdate] ... "
          $indexHtml = Get-Content "go_build/static/index.html" -Raw
          if ($indexHtml -match "triggerWinUpdate") {
            Write-Host "PASS (前端有 triggerWinUpdate 调用)"
            $passed++
          } else {
            Write-Host "FAIL (前端缺少 triggerWinUpdate)"
            $failed++
          }

          # 测试 5: 自更新 update.bat 模板 (检查 update_windows.go 有 update.bat 逻辑)
          Write-Host -NoNewline "  [update.bat 模板] ... "
          $updateGo = Get-Content "go_build/update_windows.go" -Raw
          if ($updateGo -match "update.bat" -and $updateGo -match "TokenMonitor.exe.new") {
            Write-Host "PASS (update.bat 替换逻辑存在)"
            $passed++
          } else {
            Write-Host "FAIL (缺少 update.bat 或 .new 替换逻辑)"
            $failed++
          }

          # 测试 6: 托盘菜单项完整性 (检查 gui_windows.go 有所有菜单)
          Write-Host -NoNewline "  [托盘菜单完整性] ... "
          $guiGo = Get-Content "go_build/gui_windows.go" -Raw
          $hasShow = $guiGo -match "显示仪表盘"
          $hasUpdate = $guiGo -match "检查更新"
          $hasAutoStart = $guiGo -match "开机自启"
          $hasQuit = $guiGo -match "退出"
          if ($hasShow -and $hasUpdate -and $hasAutoStart -and $hasQuit) {
            Write-Host "PASS (显示仪表盘/检查更新/开机自启/退出 4 项齐全)"
            $passed++
          } else {
            Write-Host "FAIL (菜单缺失: show=$hasShow update=$hasUpdate autostart=$hasAutoStart quit=$hasQuit)"
            $failed++
          }

          # 测试 7: 开机自启注册表逻辑 (检查 autostart_windows.go)
          Write-Host -NoNewline "  [开机自启注册表] ... "
          $autoGo = Get-Content "go_build/autostart_windows.go" -Raw
          if ($autoGo -match "CurrentVersion" -and $autoGo -match "enableAutoStart" -and $autoGo -match "disableAutoStart") {
            Write-Host "PASS (注册表读写逻辑存在)"
            $passed++
          } else {
            Write-Host "FAIL (缺少注册表读写逻辑)"
            $failed++
          }

          # 测试 8: 系统代理读取 (检查 proxy_windows.go)
          Write-Host -NoNewline "  [系统代理读取] ... "
          $proxyGo = Get-Content "go_build/proxy_windows.go" -Raw
          if ($proxyGo -match "Internet Settings" -and $proxyGo -match "ProxyServer" -and $proxyGo -match "newProxyHTTPClient") {
            Write-Host "PASS (注册表代理读取逻辑存在)"
            $passed++
          } else {
            Write-Host "FAIL (缺少代理读取逻辑)"
            $failed++
          }

          Write-Host ""
          Write-Host "=== Win 自更新+GUI 验证: $passed passed, $failed failed ==="

          if ($failed -gt 0) {
            Write-Host "FAILED: $failed tests"
            exit 1
          }
          Write-Host "All GUI/update tests passed"

          Write-Host ""
          Write-Host "=== Result: $passed/$($tests.Count) passed ==="

          # 生成 JSON 报告
          $report = @{
            label = "win-ci-$env:GITHUB_RUN_NUMBER"
            timestamp = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH-mm-ssZ")
            server = "go-windows"
            port = 15723
            total = $tests.Count
            passed = $passed
            failed = $failed
            results = $results
          }
          $reportJson = $report | ConvertTo-Json -Depth 5
          $reportJson | Out-File -FilePath "tests/reports/win-ci-$env:GITHUB_RUN_NUMBER.json"

          if ($failed -gt 0) {
            Write-Host "FAILED: $failed tests"
            exit 1
          }
          Write-Host "All tests passed"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: win-test-report
          path: tests/reports/win-ci-*.json

      - name: Stop server
        if: always()
        run: |
          if (Test-Path go_build/server.pid) {
            $procId = Get-Content go_build/server.pid
            Stop-Process -Id $procId -Force -ErrorAction SilentlyContinue
          }
