<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tokens 极简并列大屏</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="chart.js"></script>
    <style>
        :root {
            --bg-dark: #050609;
            --card-bg: rgba(9, 11, 16, 0.7);
            --card-border: rgba(255, 255, 255, 0.05);
            --text-main: #f3f4f6;
            --text-muted: #6e7681;
            
            --neon-green: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 缓慢飘动的梦幻极光背景 */
        .aurora-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .aurora-1 {
            position: absolute;
            top: -20%;
            left: -10%;
            width: 80vw;
            height: 80vw;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            filter: blur(130px);
            animation: float-aurora-1 25s infinite alternate ease-in-out;
        }

        .aurora-2 {
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 70vw;
            height: 70vw;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
            filter: blur(130px);
            animation: float-aurora-2 30s infinite alternate ease-in-out;
        }

        @keyframes float-aurora-1 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(6vw, 5vh) scale(1.1); }
        }

        @keyframes float-aurora-2 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-6vw, -8vh) scale(1.05); }
        }

        /* 极简高科技大卡片 - 宽度自适应并列布局 */
        .container {
            max-width: 960px;
            width: 95%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 35px;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.3), transparent);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 11px;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 并列网格布局 */
        .dashboard-grid {
            display: flex;
            gap: 40px;
            width: 100%;
            margin-bottom: 10px;
        }

        .dashboard-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 0;
        }

        .col-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        /* 环形图和数据叠合的主体区域 */
        .chart-section {
            position: relative;
            width: 250px;
            height: 250px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chart-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* 位于 Donut 心脏的今日总消耗字样 */
        .donut-center {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .donut-center .total-label {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .donut-center .total-value {
            font-size: 32px;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.1;
            margin-top: 4px;
            letter-spacing: -1px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        /* 工具占比卡片分布 */
        .legend-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .legend-item {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .legend-item:hover {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.06);
        }

        .tool-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 600;
        }

        .tool-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            box-shadow: 0 0 6px currentColor;
        }

        .tool-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 700;
        }



        /* 移动端自适应 */
        @media (max-width: 850px) {
            body {
                overflow-y: auto;
                padding: 40px 20px;
            }
            .container {
                padding: 25px 20px;
            }
            .dashboard-grid {
                flex-direction: column;
                gap: 45px;
            }
        }

        /* 右上角趋势按钮 */
        .history-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: var(--text-main);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 50;
        }
        .history-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(168, 85, 247, 0.4);
            color: #a855f7;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.15);
        }
        .history-btn svg {
            width: 20px;
            height: 20px;
        }

        /* 磨砂毛玻璃弹窗遮罩 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(5, 6, 9, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 弹窗主体面板 */
        .modal-content {
            background: rgba(9, 11, 16, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            width: 90%;
            max-width: 620px;
            padding: 30px;
            position: relative;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), 0 0 40px rgba(168, 85, 247, 0.05);
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        .modal-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #a855f7, transparent);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .modal-header h3 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #c7d2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .close-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 24px;
            line-height: 1;
            transition: color 0.2s;
        }
        .close-btn:hover {
            color: #ffffff;
        }

        /* 胶囊型 Segmented Tab */
        .tab-container {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 3px;
            border-radius: 12px;
            display: inline-flex;
            gap: 2px;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 6px 16px;
            border-radius: 9px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.2);
            color: #d8b4fe;
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
        }

        /* 折线图绘制区 */
        .modal-chart-wrapper {
            width: 100%;
            height: 300px;
            position: relative;
        }

    </style>
</head>

                <line x1="18" y1="20" x2="18" y2="10"></line>
                <line x1="12" y1="20" x2="12" y2="4"></line>
                <line x1="6" y1="20" x2="6" y2="14"></line>
            </svg>
        </button>
        <header>
            <h1>今日 Token 消耗统计</h1>

        </header>

        <!-- 工具/模型并列网格 -->
        <div class="dashboard-grid">
            <!-- 左侧：按工具分布 -->
            <div class="dashboard-col">

                <div class="chart-section">

                </div>
                <div class="legend-section" id="toolLegendContainer">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 右侧：按模型分布 -->
            <div class="dashboard-col">
                <h2 class="col-title">模型维度统计</h2>
                <div class="chart-section">
                    <div class="chart-wrapper">

                    </div>
                    <div class="donut-center">
                        <span class="total-label">今日总数</span>
                        <span class="total-value" id="modelTotTokens">0</span>
                    </div>
                </div>
                <div class="legend-section" id="modelLegendContainer">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>


    </div>

    <!-- 历史统计弹窗 -->
    <div id="historyModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>大模型消耗趋势</h3>
                <button id="historyCloseBtn" class="close-btn">&times;</button>
            </div>
            <div class="tab-row" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; width: 100%;">
                <div class="tab-container" id="timeTabContainer">
                    <button class="tab-btn active" data-days="7">周统计</button>
                    <button class="tab-btn" data-days="30">月统计</button>
                </div>
                <div class="tab-container" id="dimTabContainer">
                    <button class="tab-btn active" data-dim="tool">按工具统计</button>
                    <button class="tab-btn" data-dim="model">按模型统计</button>
                </div>
            </div>
            <div class="modal-chart-wrapper">
                <canvas id="historyChart"></canvas>
            </div>
        </div>
    </div>

        function getDailyPengSaying(dateStr) {
            if (!dateStr) return "九万里风鹏正举";
            let hash = 0;
            for (let i = 0; i < dateStr.length; i++) {
                hash = dateStr.charCodeAt(i) + ((hash << 5) - hash);
            }
            const index = Math.abs(hash) % pengSayings.length;
            return pengSayings[index];
        }

        // 大数值智能格式化 (KISS且防溢出)
        function formatTokens(num) {
            if (num >= 100000000) {
                return (num / 100000000).toFixed(2) + ' 亿';
            }
            if (num >= 1000000) {
                return (num / 1000000).toFixed(2) + ' M';
            }
            if (num >= 1000) {
                return (num / 1000).toFixed(1) + ' K';
            }
            return num.toString();
        }

        // 定义工具的指定颜色映射
        const toolColors = {
            'codex': '#3b82f6',
            'antigravity': '#a855f7',
            'hermes': '#10b981',
            'other': '#6b7280'
        };

        // 定义模型的指定颜色映射
        const modelColors = {
            'deepseek-v4-flash': '#0ea5e9',
            'gemini 3.5 flash': '#a855f7',
            'deepseek-v4-pro': '#2563eb',
            'gpt-5.5': '#10b981',
            'deepseek-v4-flash-free': '#14b8a6',
            'other': '#6b7280'
        };

        function getToolColor(toolName) {
            const name = toolName.toLowerCase();
            return toolColors[name] || toolColors['other'];
        }

        function getModelColor(modelName) {
            const name = modelName.toLowerCase();
            return modelColors[name] || modelColors['other'];
        }

        function initCharts() {
            const toolCtx = document.getElementById('toolChart').getContext('2d');
            toolChartInstance = new Chart(toolCtx, {
                type: 'doughnut',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        backgroundColor: [],
                        borderColor: '#0b0d12',
                        borderWidth: 3,
                        hoverOffset: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '80%', // 完美的中空圆环
                    plugins: {
                        legend: { display: false },
                        tooltip: { enabled: false }
                    }
                }
            });

            const modelCtx = document.getElementById('modelChart').getContext('2d');
            modelChartInstance = new Chart(modelCtx, {
                type: 'doughnut',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        backgroundColor: [],
                        borderColor: '#0b0d12',
                        borderWidth: 3,
                        hoverOffset: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '80%',
                    plugins: {
                        legend: { display: false },
                        tooltip: { enabled: false }
                    }
                }
            });
        }

        const API_BASE = 'http://127.0.0.1:15723';

        async function updateData() {
            try {
                const response = await fetch(API_BASE + '/api/usage');
                const data = await response.json();

                if (data.error) {
                    console.error("API Error:", data.error);
                    return;
                }

                const formattedTotal = formatTokens(data.summary.total_tokens);

                // 1. 更新圆心今日总数与日期
                document.getElementById('toolTotTokens').innerText = formattedTotal;
                document.getElementById('modelTotTokens').innerText = formattedTotal;
                document.getElementById('hdrDate').innerText = data.summary.date;
                document.getElementById('hdrSaying').innerText = getDailyPengSaying(data.summary.date);



                // 3. 渲染工具维度分布
                const toolLegendContainer = document.getElementById('toolLegendContainer');
                toolLegendContainer.innerHTML = '';

                const threshold = data.summary.total_tokens * 0.001;

                const tools = Object.keys(data.by_tool).filter(t => data.by_tool[t].total_tokens >= threshold);
                tools.sort((a, b) => data.by_tool[b].total_tokens - data.by_tool[a].total_tokens);

                const toolLabels = tools;
                const toolValues = tools.map(t => data.by_tool[t].total_tokens);
                const toolColorArr = tools.map(t => getToolColor(t));

                tools.forEach((tool, idx) => {
                    const toolVal = data.by_tool[tool].total_tokens;
                    const percent = data.summary.total_tokens > 0 ? ((toolVal / data.summary.total_tokens) * 100).toFixed(1) : '0.0';
                    const color = toolColorArr[idx];

                    const item = document.createElement('div');
                    item.className = 'legend-item';
                    item.innerHTML = `
                        <div class="tool-info">
                            <span class="tool-dot" style="color: ${color}; background-color: ${color};"></span>
                            <span>${tool}</span>
                        </div>
                        <div class="tool-value" style="color: ${color};">
                            ${formatTokens(toolVal)} <span style="font-size: 11px; font-weight: 500; color: var(--text-muted); margin-left: 4px;">(${percent}%)</span>
                        </div>
                    `;
                    toolLegendContainer.appendChild(item);
                });

                toolChartInstance.data.labels = toolLabels;
                toolChartInstance.data.datasets[0].data = toolValues;
                toolChartInstance.data.datasets[0].backgroundColor = toolColorArr;
                toolChartInstance.update();

                if (tools.length === 0) {
                    toolLegendContainer.innerHTML = '<div style="text-align: center; color: var(--text-muted); font-size: 13px; padding: 20px;">今日暂无活跃数据</div>';
                }

                // 4. 渲染模型维度分布
                const modelLegendContainer = document.getElementById('modelLegendContainer');
                modelLegendContainer.innerHTML = '';

                const models = Object.keys(data.by_model).filter(m => data.by_model[m] >= threshold);
                models.sort((a, b) => data.by_model[b] - data.by_model[a]);

                const modelLabels = models;
                const modelValues = models.map(m => data.by_model[m]);
                const modelColorArr = models.map(m => getModelColor(m));

                models.forEach((model, idx) => {
                    const modelVal = data.by_model[model];
                    const percent = data.summary.total_tokens > 0 ? ((modelVal / data.summary.total_tokens) * 100).toFixed(1) : '0.0';
                    const color = modelColorArr[idx];

                    const item = document.createElement('div');
                    item.className = 'legend-item';
                    item.innerHTML = `
                        <div class="tool-info">
                            <span class="tool-dot" style="color: ${color}; background-color: ${color};"></span>
                            <span>${model}</span>
                        </div>
                        <div class="tool-value" style="color: ${color};">
                            ${formatTokens(modelVal)} <span style="font-size: 11px; font-weight: 500; color: var(--text-muted); margin-left: 4px;">(${percent}%)</span>
                        </div>
                    `;
                    modelLegendContainer.appendChild(item);
                });

                modelChartInstance.data.labels = modelLabels;
                modelChartInstance.data.datasets[0].data = modelValues;
                modelChartInstance.data.datasets[0].backgroundColor = modelColorArr;
                modelChartInstance.update();

                if (models.length === 0) {
                    modelLegendContainer.innerHTML = '<div style="text-align: center; color: var(--text-muted); font-size: 13px; padding: 20px;">今日暂无活跃数据</div>';
                }

            } catch (err) {
                console.error("Fetch failed:", err);
            }
        }

        // 历史图表全局变量
        let rawHistoryData = null; // 缓存的 30 天原始数据

        function initHistoryChart() {
            const ctx = document.getElementById('historyChart').getContext('2d');

            historyChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: []
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: { 
                            display: true,
                            position: 'top',
                            labels: {
                                color: '#6e7681',
                                font: { family: 'Outfit', size: 10, weight: 600 },
                                boxWidth: 8,
                                boxHeight: 8,
                                usePointStyle: true,
                                pointStyle: 'circle'
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return ` ${context.dataset.label}: ${formatTokens(context.parsed.y)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: {
                                color: '#6e7681',
                                font: { family: 'Outfit', size: 10 }
                            }
                        },
                        y: {
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: {
                                color: '#6e7681',
                                font: { family: 'Outfit', size: 10 },
                                callback: function(value) {
                                    return formatTokens(value);
                                }
                            }
                        }
                    }
                }
            });
        }

        async function fetchHistoryAndRender(days = 7, dimension = 'tool') {
            if (!rawHistoryData) {
                try {
                    const res = await fetch(API_BASE + '/api/history');
                    rawHistoryData = await res.json();
                } catch (err) {
                    console.error("加载历史统计数据出错:", err);
                    return;
                }
            }

            if (!rawHistoryData || !rawHistoryData.labels) return;

            // 提取最新的 `days` 天数据作为横坐标标签
            const slicedLabels = rawHistoryData.labels.slice(-days).map(dateStr => {
                const parts = dateStr.split('-');
                return parts.length >= 3 ? `${parts[1]}/${parts[2]}` : dateStr;
            });

            const newDatasets = [];

            // 永远置顶添加“总消耗”折线，作为总量基准（虚线，且置于第一位以确保在 Tooltip 中最先体现）
            const dailyTotals = rawHistoryData.values.slice(-days);
            newDatasets.push({
                label: "总消耗",
                data: dailyTotals,
                borderColor: "rgba(255, 255, 255, 0.45)",
                borderWidth: 2,
                borderDash: [5, 4],
                fill: false,
                tension: 0.4,
                pointBackgroundColor: "rgba(255, 255, 255, 0.7)",
                pointBorderColor: '#ffffff',
                pointBorderWidth: 1,
                pointRadius: 3.5,
                pointHoverRadius: 6
            });

            if (dimension === 'tool') {
                // 渲染工具维度折线
                const toolsList = Object.keys(rawHistoryData.by_tool);
                toolsList.forEach(tool => {
                    const dailyValues = rawHistoryData.by_tool[tool].slice(-days);
                    const hasData = dailyValues.some(v => v > 0);
                    if (hasData) {
                        const color = getToolColor(tool);
                        newDatasets.push({
                            label: tool,
                            data: dailyValues,
                            borderColor: color,
                            borderWidth: 2.5,
                            fill: false,
                            tension: 0.4,
                            pointBackgroundColor: color,
                            pointBorderColor: '#ffffff',
                            pointBorderWidth: 1,
                            pointRadius: 3,
                            pointHoverRadius: 5
                        });
                    }
                });
            } else {
                // 渲染模型维度折线
                const modelsList = Object.keys(rawHistoryData.by_model);
                modelsList.forEach(model => {
                    const dailyValues = rawHistoryData.by_model[model].slice(-days);
                    const hasData = dailyValues.some(v => v > 0);
                    if (hasData) {
                        const color = getModelColor(model);
                        newDatasets.push({
                            label: model,
                            data: dailyValues,
                            borderColor: color,
                            borderWidth: 2.5,
                            fill: false,
                            tension: 0.4,
                            pointBackgroundColor: color,
                            pointBorderColor: '#ffffff',
                            pointBorderWidth: 1,
                            pointRadius: 3,
                            pointHoverRadius: 5
                        });
                    }
                });
            }

            // 更新折线图
            if (!historyChartInstance) {
                initHistoryChart();
            }
            historyChartInstance.data.labels = slicedLabels;
            historyChartInstance.data.datasets = newDatasets;
            historyChartInstance.update();
        }

        window.addEventListener('DOMContentLoaded', () => {
            initCharts();

            // 首次启动快速重试：每 150ms 重试直到服务器就绪，然后切换为 3s 常规轮询
            let bootRetryTimer = setInterval(async () => {
                try {
                    await updateData();
                    // 首次成功，停止快速重试，切换为稳态 3 秒轮询
                    clearInterval(bootRetryTimer);
                    setInterval(updateData, 3000);
                } catch (e) {
                    // 服务器还没就绪，继续重试
                }
            }, 150);

            // 绑定历史弹窗的触发事件
            const historyModal = document.getElementById('historyModal');
            const historyOpenBtn = document.getElementById('historyOpenBtn');
            const historyCloseBtn = document.getElementById('historyCloseBtn');
            
            const timeTabBtns = document.querySelectorAll('#timeTabContainer .tab-btn');
            const dimTabBtns = document.querySelectorAll('#dimTabContainer .tab-btn');

            function getActiveParams() {
                const activeTimeBtn = document.querySelector('#timeTabContainer .tab-btn.active');
                const activeDimBtn = document.querySelector('#dimTabContainer .tab-btn.active');
                const days = activeTimeBtn ? parseInt(activeTimeBtn.getAttribute('data-days')) : 7;
                const dim = activeDimBtn ? activeDimBtn.getAttribute('data-dim') : 'tool';
                return { days, dim };
            }

            historyOpenBtn.addEventListener('click', () => {
                historyModal.classList.add('active');
                const params = getActiveParams();
                fetchHistoryAndRender(params.days, params.dim);
            });

            historyCloseBtn.addEventListener('click', () => {
                historyModal.classList.remove('active');
            });

            // 点击遮罩外部区域关闭
            historyModal.addEventListener('click', (e) => {
                if (e.target === historyModal) {
                    historyModal.classList.remove('active');
                }
            });

            // 绑定时间 Tab 点击
            timeTabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    timeTabBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const params = getActiveParams();
                    fetchHistoryAndRender(params.days, params.dim);
                });
            });

            // 绑定维度 Tab 点击
            dimTabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    dimTabBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const params = getActiveParams();
                    fetchHistoryAndRender(params.days, params.dim);
                });
            });
        });
    </script>
